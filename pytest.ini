[pytest]
addopts =
    -m "not integration and not qa and not browser and not ffmpeg and not node and not hyperframes and not slow and not live_provider"
markers =
    integration: local integration tests that touch runtimes or generated media
    qa: manual or media-quality QA checks
    browser: tests that launch or drive a browser
    ffmpeg: tests that require the FFmpeg/ffprobe binaries
    node: tests that require Node.js, pnpm, npx, or npm tooling
    hyperframes: tests that require the HyperFrames runtime or CLI
    slow: tests that are too slow for routine local development
    live_provider: tests that may call paid or network provider APIs
